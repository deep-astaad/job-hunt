services:
  mysql:
    image: mysql:8.0
    container_name: jobhunt-mysql
    # ports:
    #   - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobhunt-redis
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-django
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_MODE: web
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/jobs/stats/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: jobhunt-celery-worker
    env_file:
      - .env
    environment:
      APP_MODE: celery-worker
      DJANGO_API_URL: http://django:8000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100

  job-finder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-job-finder
    env_file:
      - .env
    environment:
      APP_MODE: job-finder
      DJANGO_API_URL: http://django:8000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
