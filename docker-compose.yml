services:
  mysql:
    image: mysql:8.0
    container_name: jobhunt-mysql
    # ports:
    #   - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-django
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_MODE: web
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/jobs/stats/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

  job-finder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-job-finder
    env_file:
      - .env
    environment:
      APP_MODE: job-finder
      DJANGO_API_URL: http://django:8000
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    depends_on:
      django:
        condition: service_healthy

volumes:
  mysql_data:
