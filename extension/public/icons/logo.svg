<?xml version="1.0" encoding="UTF-8"?>
<!-- AppFill logo. Master reference; PNG icons are generated by
     scripts/make-icons.mjs which mirrors these shapes/colors. -->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- rounded app tile -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- form card -->
  <rect x="26" y="20" width="62" height="88" rx="12" fill="#ffffff"/>
  <!-- field rows -->
  <rect x="36" y="36" width="30" height="7" rx="3.5" fill="#2563eb"/>
  <rect x="36" y="54" width="42" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="36" y="70" width="42" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="36" y="86" width="26" height="6" rx="3" fill="#cbd5e1"/>
  <!-- autofill "done" badge -->
  <circle cx="92" cy="92" r="22" fill="#22c55e" stroke="#ffffff" stroke-width="5"/>
  <path d="M83 92 l6 7 l12 -14" fill="none" stroke="#ffffff" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
